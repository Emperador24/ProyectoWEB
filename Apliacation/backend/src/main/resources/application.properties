spring.application.name=vigilancia-docente

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:vigilanciadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# CRÍTICO: evita LazyInitializationException al serializar entidades en REST
spring.jpa.open-in-view=false

# Evita bucles infinitos en serialización JSON con relaciones bidireccionales
spring.jackson.serialization.fail-on-empty-beans=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

logging.level.com.vigilancia=INFO
logging.level.org.hibernate.SQL=WARN