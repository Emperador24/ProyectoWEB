spring.application.name=vigilancia-docente

# H2 en memoria (cambiar a PostgreSQL en producción)
spring.datasource.url=jdbc:h2:mem:vigilanciadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# CORS para React dev (puerto 5173)
spring.web.cors.allowed-origins=http://localhost:5173
