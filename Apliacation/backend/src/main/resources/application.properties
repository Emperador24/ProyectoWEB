spring.application.name=vigilancia-docente

# -------------------------------------------------------
# Datasource
# Local: H2 en archivo (datos persisten entre reinicios)
# Docker: PostgreSQL (variables de entorno)
# -------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/vigilanciadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# 'update' = mantiene tablas y datos entre reinicios
# Nunca usar 'create-drop' si quieres persistencia
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false

# H2 console: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

logging.level.com.vigilancia=INFO
logging.level.org.hibernate.SQL=WARN