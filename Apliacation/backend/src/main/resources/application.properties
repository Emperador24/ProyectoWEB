spring.application.name=vigilancia-docente

# -------------------------------------------------------
# Datasource — se sobreescribe con variables de entorno
# en Docker. Localmente sigue usando H2.
# -------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:vigilanciadb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Driver se detecta automáticamente según la URL
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

# 'update' crea/actualiza tablas sin borrar datos (producción)
# Localmente con H2 se puede dejar en 'create-drop' o 'update'
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}

spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false

# H2 console (solo disponible con H2, ignorado con Postgres)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

logging.level.com.vigilancia=INFO
logging.level.org.hibernate.SQL=WARN