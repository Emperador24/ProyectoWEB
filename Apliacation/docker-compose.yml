version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: vigilancia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vigilanciadb
      POSTGRES_USER: vigilancia
      POSTGRES_PASSWORD: vigilancia123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilancia -d vigilanciadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigilancia_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vigilanciadb
      SPRING_DATASOURCE_USERNAME: vigilancia
      SPRING_DATASOURCE_PASSWORD: vigilancia123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: